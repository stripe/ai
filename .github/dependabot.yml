version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directories:
      - "/**"
    exclude-patterns:
      - "/benchmarks/**"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directories:
      - "/**"
    exclude-patterns:
      - "/benchmarks/**"
    schedule:
      interval: "weekly"
