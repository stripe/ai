name: Sync skills from docs.stripe.com

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at 00:00 UTC
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        if: |
          github.ref == 'refs/heads/master' &&
          github.event_name == 'push' &&
          !github.event.repository.fork
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GH_APP_STRIPE_AI_SYNC_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_STRIPE_AI_SYNC_PEM }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
      
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # GITHUB_TOKEN pushes do not trigger workflow_run / push events. So we use a Github App
          # See: https://docs.github.com/en/actions/concepts/security/github_token#when-github_token-triggers-workflow-runs
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Run sync script
        run: node skills/sync.js
 
      - name: Verify provider skill directories match source
        run: |
          out_of_sync=false

          for provider in claude cursor; do
            target="providers/$provider/plugin/skills"

            for skill_dir in skills/*/; do
              skill_name="$(basename "$skill_dir")"
              diff -r "skills/$skill_name" "$target/$skill_name" > /dev/null 2>&1 || {
                echo "❌ $target/$skill_name is out of sync with skills/$skill_name"
                diff -r "skills/$skill_name" "$target/$skill_name" || true
                out_of_sync=true
              }
            done
          done

          if [ "$out_of_sync" = true ]; then
            echo ""
            echo "Fix: run ./scripts/sync-skills.sh and commit the result."
            exit 1
          fi

          echo "✅ All provider skill directories are in sync."
    
      - name: Push to Github
        if: |
          github.ref == 'refs/heads/master' &&
          github.event_name == 'push' &&
          !github.event.repository.fork
        shell: bash
        run: |
          git add -u

          # Allow commit to work
          git config user.name "stripe-ai-sync[bot]"
          git config user.email "282683001+stripe-ai-sync[bot]@users.noreply.github.com"

          # Append a commit with a fix applied
          git commit -m "sync skills"

          # Authenticate with the GitHub App token and push
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}
          git push
